services:
  app:
    build:
      dockerfile: Dockerfile
      context: .
    container_name: app
    ports:
      - "80:80"
      - "443:3000"
    volumes:
      - ./ssl:/app/ssl:ro
    environment:
      ADMIN_PASSWORD: "2401154@SIT.singaporetech.edu.sg"
      DB_HOST: db
      DB_USER: app
      DB_PASSWORD: pass
      DB_NAME: searchdb
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: searchdb
      MYSQL_USER: app
      MYSQL_PASSWORD: pass
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app", "-ppass"]
      interval: 10s
      timeout: 5s
      retries: 15

  git-server:
    build:
      dockerfile: gitserver.Dockerfile
      context: .
    container_name: git-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./repos:/var/www/git

volumes:
  db_data:
